name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME}"
          ldflags="-s -w -X github.com/nemanjab17/smurf/internal/version.Version=${version}"
          for cmd in smurf smurfd; do
            bin="${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}"
            go build -trimpath -ldflags "${ldflags}" -o "${bin}" "./cmd/${cmd}"
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for cmd in smurf smurfd; do
            bin="${cmd}-${{ matrix.goos }}-${{ matrix.goarch }}"
            gh release upload "${{ github.event.release.tag_name }}" "${bin}"
          done
