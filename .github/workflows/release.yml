name: Release CLI

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build smurf CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          bin="smurf-${{ matrix.goos }}-${{ matrix.goarch }}"
          version="${GITHUB_REF_NAME}"
          go build -trimpath -ldflags "-s -w -X github.com/nemanjab17/smurf/internal/version.Version=${version}" -o "${bin}" ./cmd/smurf

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bin="smurf-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${{ github.event.release.tag_name }}" "${bin}"
